upstream frontend {
  server frontend:80;
}

upstream backend {
  server backend:8080;
}

server {
  listen 80;
  server_name _;

  # Proxy PDF requests to the backend service
  location /pdf-proxy {
    proxy_pass http://backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
  }

  # Healthcheck forwarded to backend
  location /healthz {
    proxy_pass http://backend/healthz;
  }

  # Everything else served by frontend
  location / {
    proxy_pass http://frontend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
  }
}
